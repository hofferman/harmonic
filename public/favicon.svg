<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Yellow background -->
  <rect width="100" height="100" fill="#F4C430" rx="20"/>
  
  <!-- Musical note -->
  <g transform="translate(50, 50)">
    <!-- Stem -->
    <rect x="8" y="-20" width="3" height="35" fill="#1a1a1a"/>
    
    <!-- Top circle -->
    <circle cx="12" cy="-15" r="8" fill="#1a1a1a"/>
    
    <!-- Bottom circle -->
    <circle cx="2" cy="15" r="9" fill="#1a1a1a"/>
    
    <!-- Connecting curve -->
    <path d="M 11 -10 Q 15 -5 3 10" stroke="#1a1a1a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  </g>
</svg>
